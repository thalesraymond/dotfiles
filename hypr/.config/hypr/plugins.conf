source = $HOME/.config/hypr/colors.conf

plugin {
    hyprexpo {
        columns = 3
        gap_size = 2
        bg_col = 0000000
        workspace_method = center current
        enable_gesture = 0
        gesture_distance = 300
        skip_empty = true
    }

    hyprscrolling {
        column_width = 0.5
        fullscreen_on_one_column = true
        focus_fit_method = 1
    }
}